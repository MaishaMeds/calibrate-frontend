services:
  calibrate-frontend:
    build:
      context: .
      # NEXT_PUBLIC_* must be supplied at build time — they're baked into the
      # client bundle by Next.js and cannot be overridden at runtime.
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-}
        NEXT_PUBLIC_DOCS_URL: ${NEXT_PUBLIC_DOCS_URL:-}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
        NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${NEXT_PUBLIC_SENTRY_ENVIRONMENT:-production}
        NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-}
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
    image: calibrate-frontend:latest
    ports:
      - "3000:3000"
    # Server-side vars — safe to inject at runtime.
    environment:
      AUTH_SECRET: ${AUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      AUTH_URL: ${AUTH_URL}
      MAINTENANCE_MODE: ${MAINTENANCE_MODE:-false}
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode < 500 ? 0 : 1))"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
